<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>포트폴리오 슬라이더 시안 — JJAM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{--accent:#be2d2f;--ink:#131312;--soft:#5b5954;--bg:#f5f4f1;--line:#e4e2dc;--dark:#0c0c0d;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Pretendard Variable",Pretendard,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-x:hidden;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px;}
  .page-head{padding:52px 0 4px;text-align:center;}
  .page-head h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;}
  .page-head p{margin-top:8px;color:var(--soft);font-size:.95rem;}
  .optblock{padding:40px 0 60px;border-top:1px solid var(--line);}
  .optblock:first-of-type{border-top:0;}
  .opt-label{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;}
  .opt-label .no{font-size:1.8rem;font-weight:900;color:var(--accent);}
  .opt-label h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;}
  .opt-desc{color:var(--soft);margin-bottom:24px;font-size:.95rem;}
  .opt-desc b{color:var(--ink);}

  /* 탭 */
  .tabs{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
  .tab{padding:8px 17px;border:1px solid var(--line);border-radius:100px;background:#fff;font-size:.88rem;font-weight:600;color:var(--soft);cursor:pointer;transition:.2s;}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* 슬라이더 */
  .pf-slider{position:relative;overflow:hidden;padding:20px 0 8px;}
  .pf-slider .wm{position:absolute;top:8%;left:50%;transform:translateX(-50%);font-size:clamp(4rem,15vw,11rem);font-weight:900;letter-spacing:-.04em;color:var(--ink);opacity:.05;pointer-events:none;white-space:nowrap;z-index:0;}
  .viewport{position:relative;z-index:1;overflow:visible;}
  .track{display:flex;gap:18px;will-change:transform;transition:transform .6s cubic-bezier(.5,0,.2,1);}
  .track.is-sliding{filter:url(#hblur);}
  .slide{position:relative;flex:0 0 60%;aspect-ratio:16/9;border:0;padding:0;background:#111;border-radius:12px;overflow:hidden;cursor:pointer;opacity:.4;transform:scale(.88);transition:opacity .5s,transform .5s cubic-bezier(.22,1,.36,1);}
  .slide.active{opacity:1;transform:scale(1);box-shadow:0 30px 70px rgba(0,0,0,.25);}
  .slide img{width:100%;height:100%;object-fit:cover;}
  .slide iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .slide .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(190,45,47,.94);display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s;}
  .slide:not(.active):hover .play{opacity:1;}
  .slide .play::before{content:"";margin-left:3px;border-left:15px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;}
  .slide .stit{position:absolute;left:0;right:0;bottom:0;padding:30px 16px 14px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);color:#fff;font-size:.92rem;font-weight:600;text-align:left;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:opacity .3s;}
  .slide.playing .stit,.slide.playing .play{opacity:0;pointer-events:none;}

  .nav{position:absolute;top:calc(50% - 6px);z-index:3;width:46px;height:46px;border-radius:50%;border:0;background:#fff;box-shadow:0 6px 20px rgba(0,0,0,.15);color:var(--ink);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
  .nav:hover{background:var(--accent);color:#fff;}
  .nav.prev{left:6px;} .nav.next{right:6px;}

  .foot{position:relative;z-index:2;display:flex;align-items:center;gap:20px;margin-top:26px;}
  .count{font-size:.85rem;font-weight:700;letter-spacing:.05em;color:var(--soft);font-variant-numeric:tabular-nums;}
  .count .cur{color:var(--accent);}
  .bar{flex:1;height:2px;background:var(--line);position:relative;overflow:hidden;border-radius:2px;}
  .bar span{position:absolute;left:0;top:0;height:100%;background:var(--accent);width:10%;transition:width .5s cubic-bezier(.5,0,.2,1);}
  .dots{display:flex;gap:7px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);border:0;padding:0;cursor:pointer;transition:.2s;}
  .dot.on{background:var(--accent);width:20px;border-radius:5px;}

  @media(max-width:640px){.slide{flex:0 0 82%;}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><filter id="hblur" x="-20%" y="-8%" width="140%" height="116%"><feGaussianBlur stdDeviation="16 0"/></filter></svg>

<div class="wrap page-head">
  <h1>포트폴리오 슬라이더 시안</h1>
  <p>가운데 오는 영상은 자동 재생(무음)됩니다 · 슬라이드 시 가로 모션 블러 · 워터마크 PORTFOLIO</p>
</div>

<!-- A -->
<section class="optblock wrap">
  <div class="opt-label"><span class="no">A</span><h2>가로 블러 슬라이더 (레퍼런스형)</h2></div>
  <p class="opt-desc">이미지가 옆으로 흐를 때 <b>가로 모션 블러</b>, 뒤에 큰 <b>PORTFOLIO</b> 워터마크, 하단 진행 바·번호·도트. 가운데 온 영상 자동재생.</p>
  <div data-slider data-cat="전체"></div>
</section>

<!-- B -->
<section class="optblock wrap">
  <div class="opt-label"><span class="no">B</span><h2>필터 + 슬라이더 결합</h2></div>
  <p class="opt-desc">상단 <b>분야 탭</b>으로 필터 → 선택 분야 영상들이 같은 블러 슬라이더로 흐릅니다. (탭을 눌러보세요)</p>
  <div class="tabs" data-tabs></div>
  <div data-slider data-cat="전체"></div>
</section>

<script>
const V=[
  {id:"YMkMfrhTy1U",t:"고지혈증 치료, 획기적인 신약등장!! 스타틴 부작용 있다면?",c:"의료·제약"},
  {id:"WV8x4BC2Iwk",t:"배로 하는 척추수술(ALIF/OLIF) — 부산 우리들병원",c:"의료·제약"},
  {id:"d9KyiFb_DMU",t:"위고비 Vs 마운자로, 나에게 맞는 비만 치료제는?",c:"의료·제약"},
  {id:"2doDVaOWvvs",t:"MEET THE EXPERT #10 분당서울대병원 신경과 한문구 교수",c:"의료·제약"},
  {id:"NFTjLFFpz_4",t:"당뇨병에 좋은 영양제! 현직 약사가 다 알려줌",c:"의료·제약"},
  {id:"mQW6chRAKQ0",t:"한풍제약 공장 소개",c:"기업·제품"},
  {id:"5CLC1gvD4zQ",t:"한풍제약 경기약사학술대회 브이로그",c:"기업·제품"},
  {id:"nKmjEDQCP5I",t:"엔지니어드 스톤 주방상판으로 괜찮을까요?",c:"기업·제품"},
  {id:"E_LuGEFSW-s",t:"Seojinsystem 홍보영상 2022",c:"기업·제품"},
  {id:"y45bK2Lldf0",t:"밀로 만든 안동소주 / 맹개술도가",c:"문화·라이프"},
  {id:"hmSi3PG1_V0",t:"정원이 아름다운 양조장 / 해창주조장",c:"문화·라이프"},
  {id:"qQcgkA9MUoA",t:"서울국제도서전에 갔다 왔어요",c:"문화·라이프"},
  {id:"7oa3hJS4bTY",t:"대통령배 현장취재",c:"문화·라이프"},
];
const GAP=18;
const thumb=id=>`https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
const fb=id=>`https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

function makeSlider(host, items){
  host.classList.add("pf-slider");
  host.innerHTML=`
    <div class="wm">PORTFOLIO</div>
    <div class="viewport"><div class="track"></div></div>
    <button class="nav prev" aria-label="이전">‹</button>
    <button class="nav next" aria-label="다음">›</button>
    <div class="foot">
      <div class="count"><span class="cur">01</span> / <span class="tot"></span></div>
      <div class="bar"><span></span></div>
      <div class="dots"></div>
    </div>`;
  const track=host.querySelector(".track");
  const dotsEl=host.querySelector(".dots");
  const cur=host.querySelector(".cur"), tot=host.querySelector(".tot"), bar=host.querySelector(".bar span");
  track.innerHTML=items.map(v=>`
    <button class="slide" data-id="${v.id}">
      <img src="${thumb(v.id)}" onerror="this.onerror=null;this.src='${fb(v.id)}'" alt="">
      <span class="play"></span><span class="stit">${v.t}</span>
    </button>`).join("");
  dotsEl.innerHTML=items.map((_,i)=>`<button class="dot" data-i="${i}"></button>`).join("");
  tot.textContent=String(items.length).padStart(2,"0");
  const slides=[...track.querySelectorAll(".slide")];
  const dots=[...dotsEl.querySelectorAll(".dot")];
  let idx=0, inView=false;

  function center(){
    const sw=slides[0].getBoundingClientRect().width;
    const vpW=host.querySelector(".viewport").getBoundingClientRect().width;
    const x=vpW/2-(idx*(sw+GAP)+sw/2);
    track.style.transform=`translateX(${x}px)`;
  }
  function playCenter(){
    slides.forEach((s,i)=>{
      if(i===idx && inView){
        if(!s.querySelector("iframe")){
          const f=document.createElement("iframe");
          f.src=`https://www.youtube-nocookie.com/embed/${s.dataset.id}?autoplay=1&mute=1&controls=1&rel=0&playsinline=1`;
          f.allow="autoplay; fullscreen; picture-in-picture";
          s.appendChild(f); s.classList.add("playing");
        }
      }else{
        const f=s.querySelector("iframe"); if(f) f.remove(); s.classList.remove("playing");
      }
    });
  }
  function update(){
    slides.forEach((s,i)=>s.classList.toggle("active",i===idx));
    dots.forEach((d,i)=>d.classList.toggle("on",i===idx));
    cur.textContent=String(idx+1).padStart(2,"0");
    bar.style.width=((idx+1)/items.length*100)+"%";
    center();
    track.classList.add("is-sliding");
    playCenter();
  }
  track.addEventListener("transitionend",e=>{ if(e.propertyName==="transform") track.classList.remove("is-sliding"); });
  function go(i){ idx=Math.max(0,Math.min(items.length-1,i)); update(); }
  host.querySelector(".prev").onclick=()=>go(idx-1);
  host.querySelector(".next").onclick=()=>go(idx+1);
  dots.forEach(d=>d.onclick=()=>go(+d.dataset.i));
  slides.forEach((s,i)=>s.onclick=()=>{ if(i!==idx) go(i); });
  window.addEventListener("resize",center);
  new IntersectionObserver(es=>{ inView=es[0].isIntersecting; playCenter(); },{threshold:.4})
    .observe(host);
  update();                       // 즉시 초기화 (백그라운드 탭에서도 동작)
  requestAnimationFrame(center);  // 가시화 후 위치 재보정
}

// A
makeSlider(document.querySelector('.optblock:nth-of-type(1) [data-slider]'), V);

// B (탭 + 슬라이더)
const bBlock=document.querySelector('.optblock:nth-of-type(2)');
const tabsEl=bBlock.querySelector('[data-tabs]');
const bHost=bBlock.querySelector('[data-slider]');
const cats=["전체",...[...new Set(V.map(v=>v.c))]];
tabsEl.innerHTML=cats.map((c,i)=>`<button class="tab${i===0?" on":""}" data-c="${c}">${c}</button>`).join("");
function buildB(cat){
  const items=cat==="전체"?V:V.filter(v=>v.c===cat);
  makeSlider(bHost, items);
}
buildB("전체");
tabsEl.addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b) return;
  tabsEl.querySelectorAll(".tab").forEach(t=>t.classList.remove("on")); b.classList.add("on");
  buildB(b.dataset.c);
});
</script>
</body>
</html>
